<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Super Calculator - Scientific & Basic</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator-header">
            <h1>🔢 Super Calculator</h1>
            <button id="themeToggle" class="theme-toggle">🌙</button>
        </div>

        <div class="mode-toggle">
            <button id="basicModeBtn" class="mode-btn active">Basic</button>
            <button id="scientificModeBtn" class="mode-btn">Scientific</button>
            <button id="programmerModeBtn" class="mode-btn">Programmer</button>
        </div>

        <div class="display-section">
            <div class="history-display" id="historyDisplay"></div>
            <div class="main-display" id="mainDisplay">0</div>
            <div class="memory-indicator" id="memoryIndicator"></div>
        </div>

        <!-- Basic Mode -->
        <div id="basicPanel" class="calculator-panel active">
            <div class="button-grid basic-grid">
                <button class="btn function" data-action="clear">AC</button>
                <button class="btn function" data-action="negate">±</button>
                <button class="btn function" data-action="percent">%</button>
                <button class="btn operator" data-op="divide">÷</button>
                
                <button class="btn number" data-num="7">7</button>
                <button class="btn number" data-num="8">8</button>
                <button class="btn number" data-num="9">9</button>
                <button class="btn operator" data-op="multiply">×</button>
                
                <button class="btn number" data-num="4">4</button>
                <button class="btn number" data-num="5">5</button>
                <button class="btn number" data-num="6">6</button>
                <button class="btn operator" data-op="subtract">−</button>
                
                <button class="btn number" data-num="1">1</button>
                <button class="btn number" data-num="2">2</button>
                <button class="btn number" data-num="3">3</button>
                <button class="btn operator" data-op="add">+</button>
                
                <button class="btn number zero" data-num="0">0</button>
                <button class="btn number" data-num=".">.</button>
                <button class="btn function" data-action="backspace">⌫</button>
                <button class="btn equals" data-action="equals">=</button>
            </div>
        </div>

        <!-- Scientific Mode -->
        <div id="scientificPanel" class="calculator-panel">
            <div class="button-grid scientific-grid">
                <button class="btn sci-func" data-sci="sin">sin</button>
                <button class="btn sci-func" data-sci="cos">cos</button>
                <button class="btn sci-func" data-sci="tan">tan</button>
                <button class="btn sci-func" data-sci="ln">ln</button>
                <button class="btn sci-func" data-sci="log">log</button>
                <button class="btn sci-func" data-sci="sqrt">√</button>
                
                <button class="btn sci-func" data-sci="asin">asin</button>
                <button class="btn sci-func" data-sci="acos">acos</button>
                <button class="btn sci-func" data-sci="atan">atan</button>
                <button class="btn sci-func" data-sci="exp">eˣ</button>
                <button class="btn sci-func" data-sci="pow2">x²</button>
                <button class="btn sci-func" data-sci="pow3">x³</button>
                
                <button class="btn sci-func" data-sci="pi">π</button>
                <button class="btn sci-func" data-sci="e">e</button>
                <button class="btn sci-func" data-sci="fact">n!</button>
                <button class="btn sci-func" data-sci="recip">1/x</button>
                <button class="btn sci-func" data-sci="abs">|x|</button>
                <button class="btn sci-func" data-sci="pow">xʸ</button>
                
                <button class="btn number" data-num="7">7</button>
                <button class="btn number" data-num="8">8</button>
                <button class="btn number" data-num="9">9</button>
                <button class="btn operator" data-op="divide">÷</button>
                <button class="btn sci-func" data-sci="memAdd">M+</button>
                <button class="btn sci-func" data-sci="memRead">MR</button>
                
                <button class="btn number" data-num="4">4</button>
                <button class="btn number" data-num="5">5</button>
                <button class="btn number" data-num="6">6</button>
                <button class="btn operator" data-op="multiply">×</button>
                <button class="btn sci-func" data-sci="memSub">M-</button>
                <button class="btn sci-func" data-sci="memClear">MC</button>
                
                <button class="btn number" data-num="1">1</button>
                <button class="btn number" data-num="2">2</button>
                <button class="btn number" data-num="3">3</button>
                <button class="btn operator" data-op="subtract">−</button>
                <button class="btn function" data-action="clear">AC</button>
                <button class="btn function" data-action="backspace">⌫</button>
                
                <button class="btn number zero" data-num="0">0</button>
                <button class="btn number" data-num=".">.</button>
                <button class="btn operator" data-op="add">+</button>
                <button class="btn equals" data-action="equals">=</button>
                <button class="btn" data-action="openParen">(</button>
                <button class="btn" data-action="closeParen">)</button>
            </div>
        </div>

        <!-- Programmer Mode -->
        <div id="programmerPanel" class="calculator-panel">
            <div class="programmer-header">
                <div class="base-buttons">
                    <button class="base-btn active" data-base="dec">DEC</button>
                    <button class="base-btn" data-base="hex">HEX</button>
                    <button class="base-btn" data-base="bin">BIN</button>
                    <button class="base-btn" data-base="oct">OCT</button>
                </div>
            </div>
            <div class="programmer-display">
                <div class="programmer-value" id="programmerValue">0</div>
            </div>
            <div class="button-grid programmer-grid">
                <button class="btn prog-func" data-prog="and">AND</button>
                <button class="btn prog-func" data-prog="or">OR</button>
                <button class="btn prog-func" data-prog="xor">XOR</button>
                <button class="btn prog-func" data-prog="not">NOT</button>
                <button class="btn prog-func" data-prog="lshift"><<</button>
                <button class="btn prog-func" data-prog="rshift">>></button>
                
                <button class="btn number" data-num="A">A</button>
                <button class="btn number" data-num="B">B</button>
                <button class="btn number" data-num="C">C</button>
                <button class="btn number" data-num="D">D</button>
                <button class="btn number" data-num="E">E</button>
                <button class="btn number" data-num="F">F</button>
                
                <button class="btn number" data-num="7">7</button>
                <button class="btn number" data-num="8">8</button>
                <button class="btn number" data-num="9">9</button>
                <button class="btn operator" data-op="divide">÷</button>
                <button class="btn function" data-action="clear">AC</button>
                <button class="btn function" data-action="backspace">⌫</button>
                
                <button class="btn number" data-num="4">4</button>
                <button class="btn number" data-num="5">5</button>
                <button class="btn number" data-num="6">6</button>
                <button class="btn operator" data-op="multiply">×</button>
                <button class="btn number" data-num="0">0</button>
                <button class="btn equals" data-action="equals">=</button>
                
                <button class="btn number" data-num="1">1</button>
                <button class="btn number" data-num="2">2</button>
                <button class="btn number" data-num="3">3</button>
                <button class="btn operator" data-op="subtract">−</button>
                <button class="btn number" data-num=".">.</button>
                <button class="btn prog-func" data-prog="clear">CLEAR</button>
            </div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h3>📜 History</h3>
                <button id="clearHistoryBtn" class="clear-history">Clear</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">No calculations yet</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
