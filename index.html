<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lubis.me</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --panel: rgba(15, 23, 42, 0.72);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --btn: rgba(255, 255, 255, 0.08);
      --btn-hover: rgba(255, 255, 255, 0.14);
      --op: #334155;
      --accent: #22c55e;
      --danger: #ef4444;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #1d4ed8 0%, transparent 30%),
        radial-gradient(circle at top right, #0f766e 0%, transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .calculator {
      width: 100%;
      max-width: 380px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text);
    }

    .screen {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 22px;
      padding: 18px 16px;
      margin-bottom: 14px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 8px;
      overflow: hidden;
    }

    .history {
      min-height: 20px;
      text-align: right;
      font-size: 14px;
      color: var(--muted);
      word-break: break-all;
    }

    .display {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      text-align: right;
      font-size: clamp(32px, 7vw, 42px);
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      outline: none;
      border-radius: 18px;
      height: 62px;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      background: var(--btn);
      cursor: pointer;
      transition: transform 0.12s ease, background 0.2s ease, opacity 0.2s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    button:hover {
      background: var(--btn-hover);
    }

    button:active {
      transform: scale(0.97);
    }

    .operator {
      background: var(--op);
    }

    .accent {
      background: var(--accent);
      color: #052e16;
    }

    .danger {
      background: var(--danger);
    }

    .zero {
      grid-column: span 2;
    }

    .footer-note {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 420px) {
      .calculator {
        border-radius: 24px;
        padding: 14px;
      }

      .screen {
        min-height: 108px;
        padding: 16px 14px;
      }

      button {
        height: 58px;
        border-radius: 16px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="topbar">
      <span class="brand">lubis.me</span>
      <span>Simple tools for daily use</span>
    </div>

    <div class="screen">
      <div class="history" id="history"></div>
      <input id="display" class="display" type="text" value="0" readonly />
    </div>

    <div class="buttons">
      <button class="danger" data-action="clear">AC</button>
      <button class="operator" data-action="delete">⌫</button>
      <button class="operator" data-value="%">%</button>
      <button class="operator" data-value="/">÷</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="operator" data-value="*">×</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="operator" data-value="-">−</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="operator" data-value="+">+</button>

      <button class="zero" data-value="0">0</button>
      <button data-value=".">.</button>
      <button class="accent" data-action="calculate">=</button>
    </div>

    
  </div>

  <script>
    const display = document.getElementById('display');
    const history = document.getElementById('history');
    const buttons = document.querySelector('.buttons');

    let current = '0';
    let previous = '';
    let operator = null;
    let resetOnNextInput = false;

    function formatNumber(value) {
      if (!isFinite(value)) return 'Error';
      const [integer, decimal] = value.toString().split('.');
      const formattedInteger = Number(integer).toLocaleString('en-US');
      return decimal ? `${formattedInteger}.${decimal.slice(0, 8)}` : formattedInteger;
    }

    function updateDisplay() {
      display.value = current;
      history.textContent = previous && operator ? `${previous} ${symbolFor(operator)}` : previous;
    }

    function symbolFor(op) {
      return { '/': '÷', '*': '×', '-': '−', '+': '+', '%': '%' }[op] || op;
    }

    function inputNumber(num) {
      if (current === 'Error') current = '0';
      if (resetOnNextInput) {
        current = num;
        resetOnNextInput = false;
        return updateDisplay();
      }
      if (current === '0') current = num;
      else current += num;
      updateDisplay();
    }

    function inputDecimal() {
      if (resetOnNextInput) {
        current = '0.';
        resetOnNextInput = false;
        return updateDisplay();
      }
      if (!current.includes('.')) current += '.';
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      previous = '';
      operator = null;
      resetOnNextInput = false;
      updateDisplay();
    }

    function deleteLast() {
      if (resetOnNextInput) return;
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }

    function chooseOperator(nextOperator) {
      if (current === 'Error') return;

      if (operator && !resetOnNextInput) {
        calculate();
      }

      previous = current;
      operator = nextOperator;
      resetOnNextInput = true;
      history.textContent = `${previous} ${symbolFor(operator)}`;
    }

    function calculate() {
      if (!operator || previous === '') return;

      const prev = parseFloat(previous.replace(/,/g, ''));
      const curr = parseFloat(current.replace(/,/g, ''));
      let result;

      switch (operator) {
        case '+':
          result = prev + curr;
          break;
        case '-':
          result = prev - curr;
          break;
        case '*':
          result = prev * curr;
          break;
        case '/':
          result = curr === 0 ? NaN : prev / curr;
          break;
        case '%':
          result = prev % curr;
          break;
        default:
          return;
      }

      history.textContent = `${formatNumber(prev)} ${symbolFor(operator)} ${formatNumber(curr)} =`;
      current = isNaN(result) ? 'Error' : formatNumber(result);
      previous = '';
      operator = null;
      resetOnNextInput = true;
      updateDisplay();
      history.textContent = `${history.textContent}`;
    }

    buttons.addEventListener('click', (e) => {
      const button = e.target.closest('button');
      if (!button) return;

      const value = button.dataset.value;
      const action = button.dataset.action;

      if (value >= '0' && value <= '9') return inputNumber(value);
      if (value === '.') return inputDecimal();
      if (['+', '-', '*', '/', '%'].includes(value)) return chooseOperator(value);
      if (action === 'clear') return clearAll();
      if (action === 'delete') return deleteLast();
      if (action === 'calculate') return calculate();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
      else if (e.key === '.') inputDecimal();
      else if (['+', '-', '*', '/', '%'].includes(e.key)) chooseOperator(e.key);
      else if (e.key === 'Enter' || e.key === '=') {
        e.preventDefault();
        calculate();
      } else if (e.key === 'Backspace') {
        deleteLast();
      } else if (e.key === 'Escape') {
        clearAll();
      }
    });

    updateDisplay();
  </script>
</body>
</html>
